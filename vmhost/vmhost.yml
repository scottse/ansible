---
# Update apt cache, upgrade packages and install libvirt/kvm
- name: Update Apt cache and upgrade packages
  hosts: vmhost
  remote_user: test

  tasks:
   - name: Update Apt cache
     ansible.builtin.apt:
      update_cache: true

   - name: Upgrade packages with Apt
     ansible.builtin.apt:
      name: "*"
      state: latest # noqa package-latest

- name: Install required software packages
  hosts: vmhost
  remote_user: test

  tasks:
   - name: Install required software packages
     ansible.builtin.apt:
      pkg:
       - qemu-kvm
       - libvirt-daemon-system
       - libvirt-clients
       - bridge-utils
       - cloud-image-utils
       - virtinst
       - zfsutils-linux
       - python3-libvirt
       - python3-lxml
      state: present

# Configure disk for VM storage
- name: Configure disks for VM storage using ZFS and make VM directories
  hosts: vmhost
  remote_user: test

  tasks:
   - name: Create zpool for VM storage
     ansible.builtin.command: zpool create vm raidz1 /dev/sdb /dev/sdc /dev/sdd
     register: output_cmd
     changed_when: output_cmd.rc != 0

   - name: Make VM pool directories
     ansible.builtin.file:
      path: /vm/{{ item }}
      state: directory
      mode: '0755'
     loop:
      - images
      - cloud-init
      - cloud-init-iso
      - cloud-images
      - iso
